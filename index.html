<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="Script/script.js" defer></script>
    <link rel="stylesheet" href="Style/style.css">
    <title>Spaceman</title>
</head>

<body>
    <div id="start-screen" class="full-screen-layout">
        <h1 id="title">Welcome to Spaceman!</h1>
        <img src="imgs/start/pencil.png" alt="pencil" id="start-pencil">
        
        <div id="dropdown-container">
        <select id="category-select">
            <option value="" disabled selected>Select your category</option>
            <option value="random">Random</option>
        </select>
        <select id="difficulty-select">
            <option value="" disabled selected>Select your difficulty</option>
            <option value="random">Random</option>
        </select>
        <select id="theme-select" >
            <option value="" disabled selected>Select your theme</option>
            <option value="random">Random</option>
        </select>
        </div>
        <button id="start-btn" disabled >Start Game</button>
    </div>
    <div id="game-board" class="hidden">
<img src="" alt="theme character" id="theme-character" class="hidden">
        <h1 id="masked-word"></h1>
        <div id="game-info">
        <h2 id="lives">Lives left: <span id="lives-remaining"></span></h2>
        <h2 id="clue">Clue: <span id="clue-text"></span></h2>
        </div>
        <div id="letters">
            <button id="A">A</button>
            <button id="B">B</button>
            <button id="C">C</button>
            <button id="D">D</button>
            <button id="E">E</button>
            <button id="F">F</button>
            <button id="G">G</button>
            <button id="H">H</button>
            <button id="I">I</button>
            <button id="J">J</button>
            <button id="K">K</button>
            <button id="L">L</button>
            <button id="M">M</button>
            <button id="N">N</button>
            <button id="O">O</button>
            <button id="P">P</button>
            <button id="Q">Q</button>
            <button id="R">R</button>
            <button id="S">S</button>
            <button id="T">T</button>
            <button id="U">U</button>
            <button id="V">V</button>
            <button id="W">W</button>
            <button id="X">X</button>
            <button id="Y">Y</button>
            <button id="Z">Z</button>
        </div>
    </div>
    <div id="end-game" class="hidden full-screen-layout">
        <h1 id="endGameMessage"></h1>
        <h2 id="wordReveal"></h2>
        <button id="reset-btn">Play Again?</button>
    </div>
</body>

</html>
